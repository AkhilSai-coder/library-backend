# ============================================================
#  GRIET Central Library – Production application.properties
#  Spring Boot 3 | PostgreSQL | HikariCP | GZIP | JPA Tuning
# ============================================================

# ── Datasource ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool ─────────────────────────────────
# Supports 100+ concurrent users safely on Render free/starter tier
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.pool-name=LibraryHikariPool
spring.datasource.hikari.leak-detection-threshold=60000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Batch inserts – critical for 130k book bulk loads
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Second-level cache (Hibernate)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# Statement fetch size (reduces round-trips for large result sets)
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ── GZIP Compression ─────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# ── Server tuning ────────────────────────────────────────────
server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.max-connections=10000
server.tomcat.accept-count=200

# ── Spring Cache (Caffeine in-memory) ────────────────────────
spring.cache.type=caffeine
# books-catalogue: 10 min TTL, max 500 entries
# dashboard:       5 min TTL, max 10 entries
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ──────────────────────────────────────────────────
logging.level.com.griet.library=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
